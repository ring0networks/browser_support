name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.1.0-test)'
        required: true
        default: 'v0.0.0-test'

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        env:
          RAW_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          # Validate before it flows into any downstream shell/action input.
          if [[ ! "$RAW_VERSION" =~ ^v[A-Za-z0-9._-]+$ ]]; then
            echo "error: invalid version '$RAW_VERSION' (expected v<A-Za-z0-9._->)" >&2
            exit 1
          fi
          echo "version=$RAW_VERSION" >> "$GITHUB_OUTPUT"

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    needs: [resolve-version]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: >-
            ${{ github.event_name == 'workflow_dispatch'
                && format('--unreleased --tag {0}', needs.resolve-version.outputs.version)
                || format('--latest --tag {0}', needs.resolve-version.outputs.version) }}
        env:
          OUTPUT: CHANGELOG.md

      - uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: CHANGELOG.md
          retention-days: 1

  package:
    name: Package artifacts
    runs-on: ubuntu-latest
    needs: [resolve-version, changelog]
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches manifest version
        if: github.event_name == 'push'
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: bash scripts/verify-version.sh "$VERSION"

      - name: Build release tarball
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: bash scripts/package.sh "$VERSION"

      - uses: actions/upload-artifact@v7
        with:
          name: package
          path: ringzero-dome-browser-extension-${{ needs.resolve-version.outputs.version }}.tar.gz
          retention-days: 1

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [resolve-version, package, changelog]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: changelog

      - uses: actions/download-artifact@v7
        with:
          name: package

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          body_path: CHANGELOG.md
          files: ringzero-dome-browser-extension-${{ needs.resolve-version.outputs.version }}.tar.gz
